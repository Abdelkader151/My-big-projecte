<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول |  AOUADJ-AK</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            background: radial-gradient(circle at center, #2c003e 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-box h2 { margin-bottom: 30px; font-size: 2rem; color: #00f2ff; }

        .input-group { position: relative; margin-bottom: 20px; text-align: right; }
        
        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
        }

        .input-group input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus { border-color: #00f2ff; box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #00f2ff;
            border: none;
            border-radius: 12px;
            color: #1a1a1a;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover { background: #00d4e0; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 242, 255, 0.4); }

        .extra-links { margin-top: 20px; font-size: 0.9rem; opacity: 0.7; }
        .extra-links a { color: #00f2ff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo" style="font-weight: 900; color: #00f2ff; margin-bottom: 10px;"> AOUADJ-AK</div>
        <h2>تسجيل الدخول</h2>
        <form>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="login-btn">الدخول الى الموقع</button>
        </form>
        <div class="extra-links">
            <p>ليس لديك حساب؟ <a href="#">سجل الآن</a></p>
            <p><a href="INDEX2.html">← العودة للرئيسية</a></p>
        </div>
    </div>

</body>
</html>
