<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الحجز | فندق الفخامة</title>
    
    <!-- مكتبة تحويل HTML إلى PDF -->
    <script src="https://cloudflare.com"></script>

    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --green: #4caf50; }
        body { 
            background: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .container {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center; max-width: 500px; width: 100%;
        }

        /* أنيميشن علامة الصح */
        .success-icon {
            width: 80px; height: 80px; background: #e8f5e9;
            border-radius: 50%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .checkmark {
            width: 50px; height: 50px; stroke: var(--green);
            stroke-width: 3; fill: none; stroke-dasharray: 100;
            stroke-dashoffset: 100; animation: draw 0.8s forwards;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        h1 { color: var(--dark); margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }

        /* تنسيق محتوى الوصل (المخفي الذي سيتحول لـ PDF) */
        #receipt {
            padding: 20px; border: 2px dashed var(--gold);
            margin-bottom: 20px; background: #fffdf5; text-align: right;
        }

        /* الأزرار */
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 12px 25px; border-radius: 8px; border: none;
            cursor: pointer; font-weight: bold; transition: 0.3s; text-decoration: none;
        }
        .btn-pdf { background: var(--dark); color: white; }
        .btn-home { background: var(--gold); color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <div class="success-icon">
            <svg class="checkmark" viewBox="0 0 52 52">
                <path d="M14 27l7 7 16-16" />
            </svg>
        </div>

        <h1>تم استلام طلبك بنجاح!</h1>
        <p>شكراً لثقتك بنا. سيتم التواصل معك لتأكيد الحجز النهائي.</p>

        <!-- منطقة وصل الحجز -->
        <div id="receipt">
            <h3 style="color: var(--gold); margin-top: 0;">وصل حجز مبدئي</h3>
            <p><strong>رقم الطلب:</strong> <span id="order-id"></span></p>
            <p><strong>التاريخ:</strong> <span id="date"></span></p>
            <p style="font-size: 12px; color: #999;">* يرجى الاحتفاظ بهذا الوصل عند تسجيل الوصول.</p>
        </div>

        <div class="btn-group">
            <button onclick="downloadPDF()" class="btn btn-pdf">📥 تحميل الوصل (PDF)</button>
            <a href="hotel-reservation.html" class="btn btn-home">العودة للرئيسية</a>
        </div>
    </div>

    <script>
        // توليد رقم طلب عشوائي وتاريخ اليوم
        document.getElementById('order-id').innerText = Math.floor(Math.random() * 90000) + 10000;
        document.getElementById('date').innerText = new Date().toLocaleDateString('ar-DZ');

        // دالة تحميل الـ PDF
        function downloadPDF() {
            const element = document.getElementById('receipt');
            const options = {
                margin: 0.5,
                filename: 'وصل_حجز_فندق_الفخامة.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(options).from(element).save();
        }
    </script>

</body>
</html>
